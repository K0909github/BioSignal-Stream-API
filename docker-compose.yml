services:
  # FastAPIアプリ
  api:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/biosignal
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
  # PostgreSQL
  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=biosignal
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d biosignal"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  # DBデータの永続化
  db_data:
